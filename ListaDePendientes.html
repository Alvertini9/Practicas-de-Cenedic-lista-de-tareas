<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista con flechas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 10px;
            background-image: url("Binario.gif");
        }

        #Titulo{
            color: #ffffff;
            font-family:'Times New Roman', Times, serif;
            font-size: 6pc;
            text-align: center;
            background-color: rgb(14, 118, 24);
            height: 300px;
            width: 580px;
            /*Aquí abajo es el de las imagenes*/
            background-image: url("SpamDance1.gif"), url("SpanDance2.gif");
            background-size: 100px 100px, 100px 100px;
            background-position: left 10px bottom 20px , right 20px bottom 20px ;
            background-repeat: no-repeat, no-repeat;
        }

        #AgregarBtn{
            color: #ffffff;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background-image: url("Estatica.gif");
            background-position: center;
            background-size: 158px;
            background-repeat: no-repeat;
            border: 6px rgb(22, 49, 61) outset;
            border-radius: 10px;
            border-width: 8px
        }

        #NuevaTarea{
            background-image: url("Estatica.gif");
            background-repeat: no-repeat;
        }

        li {
            background: #53ba96;
            border: 1px solid #ddd;
            margin: 5px 0;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
        }

        .pendiente {
          color: #007bff;
          font-family: Verdana, Geneva, Tahoma, sans-serif;
          font-size: 20px;
        }

        .pendiente:focus {
            border-color: #007bff;
            background-color: #fff;
        }

        /*este hara que se pongan grises de como ya solucionados*/
        .completada .pendiente {
            text-decoration: line-through;
            color: #888;
            background-color: #e0e0e0;
        }

        /*aqui aparecera el simpolo positivo para que se interprete como finalizado*/
        .completada::before {
            content: "+";
            font-size:40px;
            color: green;
            margin-right: 5px;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1.2em;
            padding: 5px;
            border-radius: 3px;
        }

        button:hover {
            background-color: #eee;
        }

        .btn-completar {
            color: green;
        }

        .btn-eliminar {
            color: red;
        }
        
        /*Hace que paresca que el boton rebota*/
.btn-clicked {
    animation: clickEffect 0.3s ease;
}

@keyframes clickEffect {
    0% { transform: scale(1); }
    50% { transform: scale(0.01); }
    100% { transform: scale(1); }
}

/*(((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((((
((((((((((((((Arriba es el diselño del texto, boton, etc, y abajo de la animacion de los botones*/

.imagen-flotante {
    position: fixed;
    width: 100px;
    height: 100px;
    background-image: url("SpamtonDance.gif");
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;/*para que no bloquee clics */
    z-index: 10000;/*encima de todo, es como la opccion de cpa hasta adelante de canva*/
    opacity: 0;/*inicialmente invisible */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0); /*escala 0 para que no se vea al inicio */
    transition: opacity 0.1s; /*pequeña transición para suavizar la aparición */
}

/*animación de giro y caída */
@keyframes girarYCaer {
    0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(0deg) scale(0);
    }
    10% {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(0deg) scale(1);/*aparece en el centro */
    }
    80% {
        opacity: 1;
        transform: translate(-50%, 20%) rotate(720deg) scale(1);/*gira y baja un poco */
    }
    100% {
        opacity: 0;
        transform: translate(-50%, 100%) rotate(1080deg) scale(0.5);/*desaparece abajo */
    }
}

.imagen-flotante.activar {
    animation: girarYCaer 5s ease-in-out forwards; /* 5 segundos, se queda en el último estado */
}
    </style>
</head>
<body>
    <h1 id="Titulo">Mis Tareas</h1>
    <div>
        <input type="text" id="NuevaTarea" placeholder="Escribe una tarea...">
        <button id="AgregarBtn">Agregar tarea</button>
    </div>
    <ul id="ListaTareas"></ul>

    <script>
        //son variables globales ya que const porque no se reasignan, pero su contenido sí cambia (eso ya es nota personal mia)
        const NewWork = document.getElementById('NuevaTarea');
        const AddButton = document.getElementById('AgregarBtn');
        const Lista = document.getElementById('ListaTareas');

        //la función que crea un elemento <li> que es la lista con su span editable y botones
        function crearElementoTarea(texto = '') {
            //crea las listas
            const li = document.createElement('li');
            /*el createElement al parecer solo sirve si el JS esta dentro del html y no afuera de este en un
            archivo aparte ya que aunque lo enlace con src no mas no jalo asi que decidi calarle aqui con el script
            y que si jala, me puso triste saber eso, tantas cosas que podia hacer*/

            //el span que es editable para el texto de la tarea
            const span1 = document.createElement('span');
            span1.className = 'pendiente';//para aplicar estilos CSS
            span1.textContent = texto;//texto plano con el que textContent evitara que este se salga de los cuadros
            span1.setAttribute('contenteditable', 'true');
            //el atributo de contenteditable hece que se pueda modificar el texto

            //boton para marcar como completada 
            const Completar = document.createElement('button');
            Completar.innerHTML = 'Completado';
            Completar.className = 'btn-completar';//nombre de la clase
            Completar.addEventListener('click', () => {
                li.classList.toggle('completada');//en esta se podra añadir o quietar una clase
            });

            //boton para eliminar la tarea 
            const Eliminar = document.createElement('button');
            Eliminar.innerHTML = 'Eliminar';
            Eliminar.className = 'btn-eliminar';
            Eliminar.addEventListener('click', () => {
                li.remove();//elimina la li del span
            });

            //aqui se agrega las propiedades del li
            li.appendChild(span1);
            li.appendChild(Completar);
            li.appendChild(Eliminar);

            return li;
        }

        //funcion para agregar una nueva tarea desde el input
        function agregarTarea() {
            const texto = NewWork.value.trim(); //usa NewWork 
            if (texto === '') {
                alert('Por favor escribe una tarea');
                return;
            }
            const nuevaTarea = crearElementoTarea(texto);
            Lista.appendChild(nuevaTarea);//usa Lista 
            NewWork.value = '';//limpia el input cuando le pones enter
        }

        //evento del boton "agregar tarea"
        AddButton.addEventListener('click', agregarTarea);

        //permite agregar con la tecla Enter desde el input
        NewWork.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                agregarTarea();
            }
        });

        //animacion al hacer clic en cualquier boton
        document.addEventListener('click', function(e) {
            //verificar si el elemento cliqueado es un boton o esta dentro de un boton
            const boton = e.target.closest('button');
            if (boton) {
        //agregar la clase de animación
            boton.classList.add('btn-clicked');
        //quitarla despues de que termine la animacion 
        setTimeout(() => {
            boton.classList.remove('btn-clicked');
        }, 300);
    }
});
/////////////////////////////////////////////////////////////////////////////////////////////////////
//sirve como division para saber que arriba es lo de la funcion de agregar listas y abajo el de la animacion
function crearImagenFlotante() {
    //crear el elemento div con la clase imagen-flotante
    const img = document.createElement('div');/*al crear un <div> se pueden añadir imagenes o videos ya que actua
        como si fuese otro cuado pero en una capa adelante o atras dependiendo desde que capa lo pones.*/
    img.className = 'imagen-flotante';
    document.body.appendChild(img);/*El appendChild  agregar un elemento hijo al final de un elemento padre,
    basicamente, "mete" un nuevo nodo dentro de otro, al ultimo lugar.*/
    //activar la animacion
    img.classList.add('activar');//el activar sirvio para llamar la animacion
    //eliminar el elemento después de 5 segundos (cuando termina la animación)
    setTimeout(() => {
        img.remove();
    }, 5000); //5000ms = 5 segundos
}
//detectar clics en botones para activar la animación
document.addEventListener('click', function(e) {
    const boton = e.target.closest('button'); //verifica si se hizo clic en un botón
    if (boton) {
        crearImagenFlotante();
    }
});
    </script>
</body>
</html>
